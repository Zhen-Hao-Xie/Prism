# Conda environment for PRISM (Multimodal Continual Instruction Tuning Toolbox)
#
# Create:  conda env create -f environment.yml
# Update: conda env update -f environment.yml --prune
#
# Adjust pytorch-cuda / cudatoolkit to match your driver before creating the env.

name: prism
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip>=23.0

  # Prefer conda PyTorch; comment out and use pip requirements/torch.txt if versions clash
  - pytorch=2.0.1
  - torchvision=0.15.2
  - pytorch-cuda=11.8

  - pip:
      - -r requirements/base.txt
      - deepspeed==0.10.3
      - ninja>=1.11.0
      - pycocotools>=2.0.6
      - pycocoevalcap>=1.2
